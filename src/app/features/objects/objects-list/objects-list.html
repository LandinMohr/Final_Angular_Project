<h1 class="text-3xl font-bold mb-6">Objects Inventory</h1>

<div *ngIf="loading()" class="text-gray-600 mb-4">
  Loading objects...
</div>

<div *ngIf="error()" class="text-red-600 mb-4">
  {{ error() }}
</div>

<table *ngIf="!loading() && !error()" class="w-full border">

  <thead class="bg-gray-100">
    <tr>
      <th class="p-2 text-left">ID</th>
      <th class="p-2 text-left">Name</th>
      <th class="p-2 text-left">Actions</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let obj of objects()" class="border-t">

      <td class="p-2">{{ obj.id }}</td>
      <td class="p-2">{{ obj.name }}</td>

      <td class="p-2 space-x-3">

        <a [routerLink]="['/objects', obj.id]" class="text-blue-600 hover:underline">
          View
        </a>

        <a [routerLink]="['/objects', obj.id, 'edit']" class="text-green-600 hover:underline">
          Edit
        </a>

        <button (click)="deleteObject(obj.id!)" class="text-red-600 hover:underline">
          Delete
        </button>

      </td>

    </tr>

  </tbody>

</table>
